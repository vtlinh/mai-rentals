{% extends "base.html" %}
{% block title %}Users{% endblock %}
{% block body %}
<h1>Authorized users</h1>
<p><a class="btn" href="{{ url_for('main.users_new') }}">+ Add user</a></p>

<table>
  <tr><th>Email</th><th>Role</th><th></th></tr>
  {% for u in users %}
  <tr>
    <td>{{ u.email }}</td>
    <td>{% if u.email == admin_email %}admin{% else %}member{% endif %}</td>
    <td>
      <a class="btn-secondary btn-sm" href="{{ url_for('main.users_edit', uid=u.id) }}">edit</a>
    </td>
  </tr>
  {% endfor %}
</table>
{% endblock %}
