{% extends "base.html" %}
{% block title %}New Billing Kind{% endblock %}
{% block body %}
<h1>New Billing Kind</h1>
<form method="post">
  <label>Name
    <input name="name" required placeholder="e.g. water" autofocus>
  </label>
  <p class="muted">Lowercase; will be used as the label everywhere bills appear.</p>
  <p><button type="submit">Save</button> <a href="{{ url_for('main.kinds_list') }}">Cancel</a></p>
</form>
{% endblock %}
