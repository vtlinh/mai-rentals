<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{% block title %}Rental{% endblock %}</title>
<style>
  /* Color tokens — defaults are light mode; overridden below under prefers-color-scheme: dark. */
  :root {
    color-scheme: light dark;
    --bg: #ffffff;
    --text: #222222;
    --muted: #777777;
    --surface: #ffffff;
    --border: #dddddd;
    --row-border: #eeeeee;
    --th-bg: #f4f4f4;
    --flash-bg: #e7f5e7;
    --flash-border: #b6dfb6;
    --link: #2563eb;
    --primary: #2563eb;
    --primary-hover: #1d4ed8;
    --secondary-bg: #ffffff;
    --secondary-hover: #eff4ff;
    --danger: #c0392b;
    --danger-hover: #fdecea;
    --accent-green: #2a7a2a;
    --accent-orange: #d97a00;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1a1d22;
      --text: #e8eaed;
      --muted: #9aa0a6;
      --surface: #23272e;
      --border: #3a3f47;
      --row-border: #2e333b;
      --th-bg: #2b3038;
      --flash-bg: #1f3a26;
      --flash-border: #3a6b48;
      --link: #6cb6ff;
      --primary: #3b82f6;
      --primary-hover: #60a5fa;
      --secondary-bg: #2b313a;
      --secondary-hover: #353c47;
      --danger: #f08079;
      --danger-hover: #4a2520;
      --accent-green: #5cd35c;
      --accent-orange: #ffa64d;
    }
  }

  *, *::before, *::after { box-sizing: border-box; }
  body {
    font-family: system-ui, sans-serif; max-width: 960px; margin: 2rem auto;
    padding: 0 1rem; color: var(--text); background: var(--bg);
  }
  a { color: var(--link); }
  nav {
    display: flex; flex-wrap: wrap; align-items: center; gap: 0.5rem 1rem;
    position: sticky; top: 0; z-index: 20;
    background: var(--surface); padding: 0.6rem 0; border-bottom: 1px solid var(--border);
  }
  nav a { margin-right: 0; }
  nav .spacer { margin-left: auto; }
  /* Page-level save bar pinned to the bottom of the viewport while scrolling. */
  .sticky-save {
    position: sticky; bottom: 0; z-index: 10;
    display: flex; gap: 0.5rem; align-items: center; flex-wrap: wrap;
    background: var(--surface); border-top: 1px solid var(--border);
    padding: 0.75rem 0; margin-top: 1.5rem;
  }
  .sticky-save .danger { margin-left: auto; }
  table { border-collapse: collapse; width: 100%; margin: 1rem 0; }
  th, td { border: 1px solid var(--border); padding: 0.5rem; text-align: left; }
  th { background: var(--th-bg); }
  .flash {
    background: var(--flash-bg); border: 1px solid var(--flash-border);
    padding: 0.5rem; margin: 0.5rem 0;
  }
  form.inline { display: inline; }
  label { display: block; margin-top: 0.5rem; }
  input:not([type=checkbox]):not([type=radio]), select, textarea {
    padding: 0.5rem; min-width: 200px; max-width: 100%;
    background: var(--surface); color: var(--text);
    border: 1px solid var(--border); border-radius: 4px;
  }

  /* Buttons and button-styled links. */
  .btn, a.btn, button {
    display: inline-block; font: inherit; line-height: 1.2; cursor: pointer;
    padding: 0.45rem 0.8rem; border-radius: 6px; text-decoration: none;
    border: 1px solid var(--primary); background: var(--primary); color: #fff;
  }
  .btn:hover, button:hover { background: var(--primary-hover); border-color: var(--primary-hover); }
  .btn-secondary { background: var(--secondary-bg); color: var(--link); border-color: var(--link); }
  .btn-secondary:hover { background: var(--secondary-hover); }
  .btn-danger { background: var(--secondary-bg); color: var(--danger); border-color: var(--danger); }
  .btn-danger:hover { background: var(--danger-hover); border-color: var(--danger); }
  .btn-sm { padding: 0.2rem 0.5rem; font-size: 0.85rem; border-radius: 5px; }
  /* Group of action buttons that should sit in a row with consistent spacing. */
  .actions { display: inline-flex; gap: 0.4rem; align-items: center; flex-wrap: wrap; }

  .muted { color: var(--muted); font-size: 0.9rem; }
  .right { text-align: right; }

  @media (max-width: 640px) {
    body { margin: 1rem auto; }
    nav { gap: 0.4rem 0.9rem; }
    nav .spacer { margin-left: 0; flex-basis: 100%; margin-top: 0.3rem; }
    /* Text inputs go full-width so forms never overflow the viewport. */
    input:not([type=checkbox]):not([type=radio]), select, textarea { min-width: 0; width: 100%; }
    /* Any wide table scrolls sideways instead of breaking the layout. */
    table { display: block; overflow-x: auto; -webkit-overflow-scrolling: touch; white-space: nowrap; }
    /* Keep small buttons comfortably tappable. */
    .btn-sm { padding: 0.3rem 0.55rem; }
  }
</style>
</head>
<body>
<nav>
  <strong>Rental</strong>
  <a href="{{ url_for('main.index') }}">Dashboard</a>
  <a href="{{ url_for('main.units_list') }}">Units</a>
  <a href="{{ url_for('main.bills_list') }}">Bills</a>
  {% if is_admin(current_email()) %}
    <a href="{{ url_for('main.users_list') }}">Users</a>
  {% endif %}
  {% if current_email() %}
    <span class="spacer"></span>
    <span class="muted">{{ current_email() }}</span>
    <a href="{{ url_for('auth.logout') }}">Log out</a>
  {% endif %}
</nav>
{% with messages = get_flashed_messages() %}
  {% for m in messages %}<div class="flash">{{ m }}</div>{% endfor %}
{% endwith %}
{% block body %}{% endblock %}
</body>
</html>
