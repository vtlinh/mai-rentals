{% extends "base.html" %}
{% block title %}Billing Kinds{% endblock %}
{% block body %}
<h1>Billing Kinds</h1>
<p><a href="{{ url_for('main.kinds_new') }}">+ Add kind</a></p>
<table>
  <tr><th>Name</th><th></th></tr>
  {% for k in kinds %}
  <tr>
    <td>{{ k.name }}</td>
    <td>
      <form class="inline" method="post" action="{{ url_for('main.kinds_delete', kid=k.id) }}"
            onsubmit="return confirm('Delete billing kind \'{{ k.name }}\'?');">
        <button class="btn-danger" type="submit">delete</button>
      </form>
    </td>
  </tr>
  {% else %}
  <tr><td colspan="2" class="muted">No billing kinds defined.</td></tr>
  {% endfor %}
</table>
{% endblock %}
