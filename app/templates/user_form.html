{% extends "base.html" %}
{% block title %}{{ "Edit" if user else "New" }} user{% endblock %}
{% block body %}
<h1>{{ "Edit" if user else "Add" }} authorized user</h1>
<form id="userform" method="post">
  <label>Email
    <input type="email" name="email" required
           value="{{ user.email if user else '' }}"></label>
</form>

<div class="sticky-save">
  <button class="btn" type="submit" form="userform">Save</button>
  <a class="btn-secondary" href="{{ url_for('main.users_list') }}">Cancel</a>
  {% if user and user.email != admin_email %}
  <form class="inline danger" method="post" action="{{ url_for('main.users_delete', uid=user.id) }}"
        onsubmit="return confirm('Remove {{ user.email }} from the allowlist?');">
    <button class="btn-danger" type="submit">Remove user</button>
  </form>
  {% endif %}
</div>
{% endblock %}
