{% extends "base.html" %}
{% block title %}Manage units{% endblock %}
{% block body %}
<h1>Manage units</h1>
<p><a class="btn-secondary btn-sm" href="{{ url_for('main.units_list') }}">&larr; Back to units</a></p>

<form id="manageunitsform" method="post" action="{{ url_for('main.units_manage') }}">
  <div id="unit-rows">
    {% for unit in units %}
    <div class="unit-row" style="display:flex; gap:0.5rem; align-items:flex-end; flex-wrap:wrap; margin:0.5rem 0; padding:0.5rem; border:1px solid #eee; border-radius:6px;">
      <input type="hidden" name="existing_id" value="{{ unit.id }}">
      <label style="display:inline-block; margin:0; flex:1 1 200px;">Name<br>
        <input name="existing_name" required value="{{ unit.name }}" style="width:100%;"></label>
    </div>
    {% endfor %}
  </div>

  <p>
    <button type="button" class="btn-secondary" onclick="addUnitRow()">+ Add unit</button>
  </p>
</form>

<template id="new-unit-template">
  <div class="unit-row" style="display:flex; gap:0.5rem; align-items:flex-end; flex-wrap:wrap; margin:0.5rem 0; padding:0.5rem; border:1px dashed #999; border-radius:6px;">
    <label style="display:inline-block; margin:0; flex:1 1 200px;">New unit name<br>
      <input name="new_name" required placeholder="e.g. C3" style="width:100%;" form="manageunitsform"></label>
    <button type="button" class="btn-danger btn-sm" onclick="removeUnitRow(this)" aria-label="Remove">&times;</button>
  </div>
</template>

<div class="sticky-save">
  <button class="btn" type="submit" form="manageunitsform">Save</button>
  <a class="btn-secondary" href="{{ url_for('main.units_list') }}">Cancel</a>
</div>

<script>
function addUnitRow() {
  var tpl = document.getElementById('new-unit-template');
  var clone = tpl.content.firstElementChild.cloneNode(true);
  document.getElementById('unit-rows').appendChild(clone);
  var input = clone.querySelector('input[name="new_name"]');
  if (input) input.focus();
}
function removeUnitRow(btn) {
  if (!confirm('Remove this unit?')) return;
  btn.closest('.unit-row').remove();
}
</script>
{% endblock %}
