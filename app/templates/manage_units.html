{% extends "base.html" %}
{% block title %}Manage units{% endblock %}
{% block body %}
<h1>Manage units</h1>
<p class="actions">
  <a class="btn" href="{{ url_for('main.units_new') }}">+ Add unit</a>
  <a class="btn-secondary" href="{{ url_for('main.units_list') }}">&larr; Back to units</a>
</p>

{% for unit in units %}
<div style="border:1px solid #eee; border-radius:6px; padding:0.75rem; margin:1rem 0;">
  <form method="post" action="{{ url_for('main.units_edit', uid=unit.id) }}"
        style="display:flex; gap:0.5rem; align-items:flex-end; flex-wrap:wrap;">
    <label style="display:inline-block; margin:0;">Name<br>
      <input name="name" required value="{{ unit.name }}"></label>
    <input type="hidden" name="note" value="{{ unit.note }}">
    <button class="btn btn-sm" type="submit">Save</button>
  </form>
</div>
{% else %}
<p class="muted">No units yet.</p>
{% endfor %}
{% endblock %}
