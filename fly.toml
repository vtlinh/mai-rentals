app = "mai-rentals"
primary_region = "sjc"

[build]

# Data lives in a Google Sheet now (see README). Required Fly secrets:
#   GOOGLE_SHEETS_ID, GOOGLE_SHEETS_CREDENTIALS_JSON
# The /data volume is no longer needed and can be detached after the SQLite
# migration to Sheets has completed.

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
